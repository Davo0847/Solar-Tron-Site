<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Tron Ltd</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
html{scroll-behavior:smooth}
body{margin:0;font-family:'Inter',sans-serif;background:#0a0f1c;color:#fff;overflow-x:hidden}

#loader{position:fixed;inset:0;background:#0a0f1c;display:flex;align-items:center;justify-content:center;z-index:9999}
.loader-text{font-family:'Orbitron';font-size:28px;color:#00e5ff;animation:pulse 1.5s infinite}
@keyframes pulse{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.08)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.08)1px,transparent 1px);background-size:40px 40px;animation:moveGrid 20s linear infinite;z-index:-3}

header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(0,0,0,.7);position:sticky;top:0}
header img{height:60px;filter:drop-shadow(0 0 15px #00ffff)}
nav a{margin:0 15px;color:#00e5ff;text-decoration:none}

.hero{text-align:center;padding:140px 20px}
.hero h1{font-family:'Orbitron';font-size:52px;text-shadow:0 0 30px #00ffff}

.btn{display:inline-block;margin:20px 10px;padding:14px 28px;background:#00e5ff;color:#000;text-decoration:none;border-radius:6px;box-shadow:0 0 20px #00ffff;position:relative;overflow:hidden}
.btn:hover{box-shadow:0 0 50px #00ffff}

/* SPARK BURST */
.btn::after{
 content:"";
 position:absolute;
 width:5px;height:5px;
 background:#00ffff;
 border-radius:50%;
 opacity:0;
}
.btn:hover::after{
 animation:spark 0.6s linear;
}
@keyframes spark{
 0%{opacity:1;transform:translate(0,0)}
 100%{opacity:0;transform:translate(40px,-40px)}
}

.section{padding:80px 20px;text-align:center;opacity:0;transform:translateY(40px);transition:1s}
.section.visible{opacity:1;transform:translateY(0)}

.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;margin-top:40px}
.card{background:#111;padding:25px;width:300px;border:1px solid #00e5ff;box-shadow:0 0 20px rgba(0,229,255,.5);border-radius:12px;text-align:left}

.about{max-width:900px;margin:auto;text-align:left;line-height:1.6}

footer{background:#000;padding:40px;text-align:center;color:#777}
footer img{height:60px;margin-top:20px;filter:drop-shadow(0 0 15px #00ffff)}

/* HEARTBEAT */
.heartbeat{position:fixed;top:55%;left:0;width:200%;height:100px;z-index:-2;pointer-events:none}
.heartbeat path{fill:none;stroke:#00ffff;stroke-width:3;filter:drop-shadow(0 0 15px #00ffff);stroke-dasharray:1000;stroke-dashoffset:1000;animation:heartbeatMove 2.5s linear infinite}
@keyframes heartbeatMove{to{stroke-dashoffset:0}}

/* moving spark */
.spark-dot{
 position:absolute;
 width:8px;height:8px;
 background:#00ffff;
 border-radius:50%;
 box-shadow:0 0 20px #00ffff;
 offset-path:path('M0,50 L100,50 L120,20 L140,80 L160,50 L300,50 L320,30 L340,70 L360,50 L1000,50');
 animation:moveSpark 2.5s linear infinite;
}
@keyframes moveSpark{to{offset-distance:100%}}

</style>
</head>
<body>

<div class="heartbeat">
<svg viewBox="0 0 1000 100"><path d="M0,50 L100,50 L120,20 L140,80 L160,50 L300,50 L320,30 L340,70 L360,50 L1000,50"/></svg>
<div class="spark-dot"></div>
</div>

<div id="loader"><div class="loader-text">INITIALISING SYSTEM...</div></div>

<header>
<img src="./Solar Tron Logo.png">
<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section id="home" class="hero section">
<h1>Advanced Solar Inspection & Testing</h1>
<p>UK & Europe Wide Services | Engineering-grade solar diagnostics and compliance.</p>
<a href="mailto:info@solartron.org" class="btn">Email Us</a>
<a href="Solar_Tron_Advanced_Testing_Brochure.pdf" class="btn" download>Download Brochure</a>
</section>

<section id="services" class="section">...</section>
<section id="about" class="section">...</section>
<section id="contact" class="section">...</section>

<footer>
<p>© 2026 Solar Tron Ltd</p>
<img src="./Solar Tron Logo.png">
</footer>

<script>
window.addEventListener('load',()=>{loader.style.display='none'})

// scroll animation
const sections=document.querySelectorAll('.section');
const observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible')}})},{threshold:.2});
sections.forEach(s=>observer.observe(s));

// scroll reactive speed
window.addEventListener('scroll',()=>{
 let speed=2.5 - (window.scrollY/1000);
 document.querySelector('.heartbeat path').style.animationDuration=Math.max(speed,1)+'s';
});
</script>

</body>
</html>
